name: CI/CD Pipeline TaskFlow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: python -m pytest test_app.py -v

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t taskflow:latest .

      - name: Sauvegarder image
        run: docker save taskflow:latest > taskflow.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: taskflow.tar

  security:
    name: Scan securite Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Telecharger image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger image
        run: docker load < taskflow.tar

      - name: Scanner avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'taskflow:latest'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
